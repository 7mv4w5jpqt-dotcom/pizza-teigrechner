<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Teigrechner</title>

<style>
:root {
  --pizza-red: #d35400;
  --pizza-orange: #e67e22;
  --pizza-text: #2c2c2c;
  --card-bg: #ffffff;
  --border-soft: #e6dcd2;
}

* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, Helvetica, Arial, sans-serif;
}

body {
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #fff8f0, #fbeee0);
  color: var(--pizza-text);
}

h1 {
  text-align: center;
  color: var(--pizza-red);
  margin-bottom: 24px;
}

.container {
  max-width: 95vw;
  margin: auto;
  background: var(--card-bg);
  border-radius: 18px;
  padding: 24px 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

label { line-height: 1.4; }

input, select {
  padding: 8px 3px;
  border-radius: 10px;
  border: 1px solid var(--border-soft);
  font-size: 1rem;
}

input[type="range"] { grid-column: 1 / -1; margin-top: 6px; margin-bottom: 4px; }

.card {
  background: #ffffff; border: 1px solid var(--border-soft); border-radius: 14px;
  padding: 20px 22px; margin-bottom: 26px; box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  max-width: 100%; overflow: hidden;
}

.row { display: flex; align-items: center; justify-content: space-between; }
.row input[type="range"] { flex: 1; margin-right: 12px; }

.result {
  display: flex; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px dashed rgba(0,0,0,0.15); font-size: 0.95rem;
}
.result:last-child { border-bottom: none; }
.result strong { color: var(--pizza-red); font-weight: 600; }

.card h2 {
  margin-top: 0; margin-bottom: 14px; font-size: 1.1rem; color: var(--pizza-orange);
}

.row-line {
  display: grid; grid-template-columns: 50px 50px 60px 100px; column-gap: 4px; row-gap: 8px; align-items: center;
  margin-bottom: 14px;
}

.dough-preview {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  min-height: 38px;
  align-items: center;
  padding-left: 54px;
}

.dough-previews {
  display: grid;
  gap: 10px;
  margin-top: 2px;
}

.dough-preview.is-empty::before {
  content: "Keine Teigballen";
  color: #9a8a7c;
  font-size: 0.85rem;
}

.dough-ball {
  width: var(--ball-size);
  height: var(--ball-size);
  border-radius: 50%;
  position: relative;
  flex: 0 0 auto;
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.72) 0 14%, transparent 15%),
    radial-gradient(circle at 63% 68%, rgba(122,81,36,var(--speckle-opacity)) 0 5%, transparent 6%),
    radial-gradient(circle at 24% 74%, rgba(122,81,36,var(--speckle-opacity)) 0 4%, transparent 5%),
    radial-gradient(circle at 70% 31%, rgba(122,81,36,var(--speckle-opacity)) 0 3%, transparent 4%),
    var(--ball-color);
  border: 1px solid rgba(142, 95, 43, 0.22);
  box-shadow:
    inset -5px -7px 10px rgba(154, 102, 41, 0.13),
    inset 4px 5px 8px rgba(255,255,255,0.42),
    0 var(--shadow-y) var(--shadow-blur) rgba(91, 52, 18, 0.16);
  transform: scale(var(--ferment-scale));
}

.dough-ball.is-entering {
  animation: doughDropIn 420ms cubic-bezier(.18,.9,.28,1.22) both;
  animation-delay: var(--delay);
}

.dough-ball.is-leaving {
  animation: doughLeave 260ms ease-in both;
  animation-delay: var(--delay);
  pointer-events: none;
}

@keyframes doughDropIn {
  from {
    opacity: 0;
    transform: translateY(-26px) scale(calc(var(--ferment-scale) * 0.76));
  }
  68% {
    opacity: 1;
    transform: translateY(3px) scale(calc(var(--ferment-scale) * 1.04));
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(var(--ferment-scale));
  }
}

@keyframes doughLeave {
  from {
    opacity: 1;
    transform: translateY(0) scale(var(--ferment-scale));
  }
  to {
    opacity: 0;
    transform: translateY(18px) scale(calc(var(--ferment-scale) * 0.72));
  }
}

.input-with-unit { display: inline-flex; align-items: center; gap: 6px; width: 80px; }

.unit { color: var(--pizza-text); font-weight: 600; font-size: 0.95rem; }
.result strong.green-value { color: #3e9160 !important; }

@media (max-width: 420px) {
  .dough-preview {
    padding-left: 0;
  }
}
</style>

<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="container">
    <h1>🍕 Pizza-Teigrechner</h1>

    <!-- KASTEN 1: Anzahl + Gewicht -->
    <div class="card">
      <div class="row-line">
        <label for="balls1">Anzahl</label>
        <select id="balls1"></select>

        <label for="weight1">Gewicht</label>
        <div class="input-with-unit">
          <select id="weight1"></select>
          <span class="unit">g</span>
        </div>
      </div>

      <div class="row-line">
        <label for="balls2">Anzahl</label>
        <select id="balls2"></select>

        <label for="weight2">Gewicht</label>
        <div class="input-with-unit">
          <select id="weight2"></select>
          <span class="unit">g</span>
        </div>
      </div>

      <div class="dough-previews">
        <div class="dough-preview" id="doughPreview1" aria-label="Teigballen Vorschau 1"></div>
        <div class="dough-preview" id="doughPreview2" aria-label="Teigballen Vorschau 2"></div>
      </div>
    </div> <!-- Ende Kasten 1 -->

    <!-- KASTEN 2: Slider + Garezeit + Hefetyp -->
    <div class="card">
      <label for="dinkel">Vollkorn Mehl <span id="dinkelVal">0</span> %</label>
      <div class="row">
        <input type="range" id="dinkel" min="0" max="50" step="1" value="0">
      </div>

      <label for="caputo">Typ 00 Mehl <span id="caputoVal">100</span> %</label>
      <div class="row">
        <input type="range" id="caputo" min="0" max="100" step="1" value="100" disabled>
      </div>

      <label for="hydration" style="margin-top:10px">
        Hydration <span id="hydrationVal">63</span> %
      </label>
      <div class="row">
        <input type="range" id="hydration" min="50" max="80" step="1" value="63">
      </div>

      <label for="salt" style="margin-top:10px">
        Salz <span id="saltVal">2.9</span> %
      </label>
      <div class="row" style="margin-bottom:20px">
        <input type="range" id="salt" min="1.5" max="3.5" step="0.1" value="2.9">
      </div>
      
      <div class="row" style="display:flex; align-items:center;">
        <div>
          <label for="time" style="margin-top:10px">Garezeit</label>
          <select id="time">
            <option value="12">12 Std</option>
            <option value="24">24 Std</option>
            <option value="36">36 Std</option>
            <option value="48" selected>48 Std</option>
            <option value="60">60 Std</option>
          </select>
        </div>

              
        <div>
          <label for="yeastType" style="margin-top:10px">Hefetyp</label>
          <select id="yeastType">
            <option value="instant" selected>Instant Trockenhefe</option>
            <option value="activeDry">Aktive Trockenhefe</option>
            <option value="fresh">Frische Hefe</option>
          </select>
        </div>
      </div>
    </div> <!-- Ende Kasten 2 -->

    <!-- KASTEN 3: Ergebnisse -->
    <div class="card">
      <h2>Ergebnisse</h2>
      <div id="results"></div>
    </div>
  </div> <!-- Ende container -->

<script>
  const balls1 = document.getElementById('balls1');
  const balls2 = document.getElementById('balls2');
  const weight1 = document.getElementById('weight1');
  const weight2 = document.getElementById('weight2');
  const dinkel = document.getElementById('dinkel');
  const hydration = document.getElementById('hydration');
  const salt = document.getElementById('salt');
  const timeSel = document.getElementById('time');
  const yeastTypeSel = document.getElementById('yeastType');

  const dinkelVal = document.getElementById('dinkelVal');
  const caputoVal = document.getElementById('caputoVal');
  const hydrationVal = document.getElementById('hydrationVal');
  const saltVal = document.getElementById('saltVal');
  const doughPreview1 = document.getElementById('doughPreview1');
  const doughPreview2 = document.getElementById('doughPreview2');
  const results = document.getElementById('results');

  function addOption(select, value, label = value) {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = label;
    select.appendChild(option);
  }

  // Anzahl-Optionen
  for (let i = 0; i <= 10; i++) {
    addOption(balls1, i);
    addOption(balls2, i);
  }
  balls1.value = 1;
  balls2.value = 0;

  // Gewichtswerte
  const weightOptions = Array.from({ length: (400 - 50) / 10 + 1 }, (_, i) => 50 + i * 10);
  weightOptions.forEach(w => {
    addOption(weight1, w);
    addOption(weight2, w);
  });
  weight1.value = 300;
  weight2.value = 100;

  const inputs = [balls1, balls2, weight1, weight2, dinkel, hydration, salt, timeSel, yeastTypeSel];
  function handleInputChange() {
    calculate();
    saveSettings();
  }

  inputs.forEach(input => {
    input.addEventListener('input', handleInputChange);
    input.addEventListener('change', handleInputChange);
  });

  function loadSettings() {
    const get = k => localStorage.getItem(k);
    if (get("balls1")) balls1.value = get("balls1");
    if (get("balls2")) balls2.value = get("balls2");
    if (get("weight1")) weight1.value = get("weight1");
    if (get("weight2")) weight2.value = get("weight2");
    if (get("dinkel")) dinkel.value = get("dinkel");
    if (get("hydration")) hydration.value = get("hydration");
    if (get("salt")) salt.value = get("salt");
    if (get("timeSel")) timeSel.value = get("timeSel");
    if (get("yeastType")) yeastTypeSel.value = get("yeastType");
  }

  function saveSettings() {
    const set = (k, v) => localStorage.setItem(k, v);
    set("balls1", balls1.value);
    set("balls2", balls2.value);
    set("weight1", weight1.value);
    set("weight2", weight2.value);
    set("dinkel", dinkel.value);
    set("hydration", hydration.value);
    set("salt", salt.value);
    set("timeSel", timeSel.value);
    set("yeastType", yeastTypeSel.value);
  }

  // IDY-Prozent (aus Models.swift) — Prozent vom Mehl
  const idyPercentByHours = {
    12: 0.29,
    24: 0.17,
    36: 0.13,
    48: 0.09,
    60: 0.07
  };

  // Hefetyp-Faktoren (wie in Models.swift)
  const yeastFactorByType = {
    instant: 1.0,
    activeDry: 1.25,
    fresh: 3.0
  };

  function getDoughBallStyles(weight, hours, wholegrainPercent) {
    const weightRatio = (weight - 50) / (400 - 50);
    const timeRatio = (hours - 12) / (60 - 12);
    const wholegrainRatio = wholegrainPercent / 50;
    const size = 22 + weightRatio * 22 + timeRatio * 5;
    const fermentScale = 1 + timeRatio * 0.08;
    const lightness = 91 - wholegrainRatio * 18;
    const saturation = 74 - wholegrainRatio * 22;

    return {
      title: `${weight} g, ${hours} Std, ${wholegrainPercent}% Vollkorn`,
      size: `${size.toFixed(1)}px`,
      fermentScale: fermentScale.toFixed(2),
      speckleOpacity: (0.08 + wholegrainRatio * 0.34).toFixed(2),
      shadowY: `${(2 + timeRatio * 4).toFixed(1)}px`,
      shadowBlur: `${(7 + timeRatio * 8).toFixed(1)}px`,
      ballColor: `hsl(37, ${saturation.toFixed(0)}%, ${lightness.toFixed(0)}%)`
    };
  }

  function applyDoughBallStyles(ball, styles) {
    ball.title = styles.title;
    ball.style.setProperty('--ball-size', styles.size);
    ball.style.setProperty('--ferment-scale', styles.fermentScale);
    ball.style.setProperty('--speckle-opacity', styles.speckleOpacity);
    ball.style.setProperty('--shadow-y', styles.shadowY);
    ball.style.setProperty('--shadow-blur', styles.shadowBlur);
    ball.style.setProperty('--ball-color', styles.ballColor);
  }

  function createDoughBall(styles, delay) {
    const ball = document.createElement('span');
    ball.className = 'dough-ball is-entering';
    ball.style.setProperty('--delay', `${delay}ms`);
    applyDoughBallStyles(ball, styles);
    ball.addEventListener('animationend', () => {
      ball.classList.remove('is-entering');
      ball.style.removeProperty('--delay');
    }, { once: true });
    return ball;
  }

  function renderDoughPreview(container, count, weight, hours, wholegrainPercent) {
    const styles = getDoughBallStyles(weight, hours, wholegrainPercent);
    const activeBalls = [...container.querySelectorAll('.dough-ball:not(.is-leaving)')];
    const difference = count - activeBalls.length;

    container.classList.remove('is-empty');
    activeBalls.forEach(ball => applyDoughBallStyles(ball, styles));

    if (difference > 0) {
      for (let i = 0; i < difference; i++) {
        const remainingFromRight = difference - 1 - i;
        container.appendChild(createDoughBall(styles, remainingFromRight * 80));
      }
    }

    if (difference < 0) {
      const ballsToRemove = activeBalls.slice(0, Math.abs(difference));
      ballsToRemove.forEach((ball, index) => {
        ball.classList.remove('is-entering');
        ball.classList.add('is-leaving');
        ball.style.setProperty('--delay', `${index * 80}ms`);
        ball.addEventListener('animationend', () => {
          ball.remove();
          const hasActiveBalls = container.querySelector('.dough-ball:not(.is-leaving)');
          if (!hasActiveBalls) container.classList.add('is-empty');
        }, { once: true });
      });
    }

    if (count === 0 && !container.querySelector('.dough-ball')) {
      container.classList.add('is-empty');
    }
  }

  function calculate() {
    const b1 = +balls1.value;
    const b2 = +balls2.value;
    const w1 = +weight1.value;
    const w2 = +weight2.value;
    const d = +dinkel.value;       // Dinkel in %
    const h = +hydration.value;    // Hydration in %
    const s = +salt.value;         // Salz in %
    const t = +timeSel.value;      // Stunden
    const yeastType = yeastTypeSel.value; // instant | activeDry | fresh

    // Slider-Anzeigen
    dinkelVal.textContent = d.toFixed(0);
    hydrationVal.textContent = h.toFixed(0);
    saltVal.textContent = s.toFixed(1);

    // Caputo-Anteil
    const caputoPercent = 100 - d;
    caputoVal.textContent = caputoPercent.toFixed(0);
    document.getElementById('caputo').value = caputoPercent;

    renderDoughPreview(doughPreview1, b1, w1, t, d);
    renderDoughPreview(doughPreview2, b2, w2, t, d);

    // Geplanter Gesamtteig (ohne Verschwendung)
    const totalDough = b1 * w1 + b2 * w2;

    // Verschwendung 2 % (vom geplanten Gesamtteig)
    const waste = totalDough * 0.02;

    // Endteig (inkl. Verschwendung) — entspricht Swift: finalDoughG
    const finalDough = totalDough + waste;

    // IDY-Prozent (aus Fermentation) — Prozent vom Mehl
    const idyPercent = idyPercentByHours[t] ?? 0.09; // Default 48h: 0.09%

    // Mehl: finalDough / (1 + hyd% + salt% + idy%)
    const flour = finalDough / (1 + h / 100 + s / 100 + idyPercent / 100);

    // Zutaten
    const caputo = flour * (caputoPercent / 100);
    const dinkelFlour = flour * (d / 100);
    const water = flour * (h / 100);
    const saltG = flour * (s / 100);

    // Hefe-Menge: IDY-Basis mit Faktor je Hefetyp
    const idyGrams = flour * (idyPercent / 100);
    const yeastFactor = yeastFactorByType[yeastType] ?? 1.0;
    const yeastGrams = idyGrams * yeastFactor;

    // Bezeichnung des Hefetyps für die Ausgabe
    const yeastLabel = {
      instant: "Instant Trockenhefe",
      activeDry: "Aktive Trockenhefe",
      fresh: "Frische Hefe"
    }[yeastType] ?? "Hefe";

    // Ausgabe
    results.innerHTML = `
      <div class="result"><span>Typ 00 Mehl</span><strong class="green-value">${caputo.toFixed(0)} g</strong></div>
      <div class="result"><span>Vollkorn Mehl</span><strong class="green-value">${dinkelFlour.toFixed(0)} g</strong></div>
      <div class="result"><span>${yeastLabel}</span><strong class="green-value">${yeastGrams.toFixed(1)} g</strong></div>
      <div class="result"><span>Wasser</span><strong class="green-value">${water.toFixed(0)} g</strong></div>
      <div class="result"><span>Salz</span><strong class="green-value">${saltG.toFixed(1)} g</strong></div>
      <div class="result"><span>Mehl gesamt</span><strong>${flour.toFixed(0)} g</strong></div>
      <div class="result"><span>Gesamtteig</span><strong>${totalDough.toFixed(0)} g</strong></div>
      <div class="result"><span>Verschwendung (2%)</span><strong>${waste.toFixed(0)} g</strong></div>
      <div class="result"><span>Endteig</span><strong>${finalDough.toFixed(0)} g</strong></div>
    `;
  }

  loadSettings();
  calculate();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
